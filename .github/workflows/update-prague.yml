name: Update Prague Stops Data

on:
  schedule:
    - cron: '30 1 * * *' # Every day at 01:30 UTC (03:30 CEST)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and format stops
        run: node scripts/build-prague.mjs

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "feat: automated Prague stops enrichment update"
          file_pattern: "prague/"
